<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Area Cliente Premium 11.2</title>
<style>
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:#f4f6f8;margin:0;color:#111827}
header{background:#101827;color:#fff;padding:20px}
main{padding:14px;max-width:900px;margin:auto}
.card{background:#fff;border-radius:18px;padding:16px;margin:12px 0;box-shadow:0 8px 24px rgba(16,24,39,.08)}
.badge{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:800;background:#dcfce7;color:#166534}
.meta{color:#667085;font-size:13px}
</style>
</head>
<body>
<header><h1>Area Cliente</h1><p>SB Personal Coach</p></header>
<main>
<div class="card"><h2 id="nome">Caricamento...</h2><p id="info" class="meta"></p></div>
<div class="card"><h2>Lezioni</h2><div id="lezioni"></div></div>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collectionGroup, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { firebaseConfig } from "./firebase-config.js";
const app=initializeApp(firebaseConfig), db=getFirestore(app);
const params=new URLSearchParams(location.search), id=params.get("id");
function fmt(d){if(!d)return"-";const [y,m,day]=String(d).slice(0,10).split("-");return `${day}/${m}/${y}`}
async function load(){
 if(!id){document.getElementById("nome").textContent="Link non valido";return}
 const qs=await getDocs(query(collectionGroup(db,"clienti"),where("__name__","==",id)));
 if(qs.empty){document.getElementById("nome").textContent="Cliente non trovato";return}
 const c={id:qs.docs[0].id,...qs.docs[0].data()};
 document.getElementById("nome").textContent=`${c.nome||""} ${c.cognome||""}`;
 document.getElementById("info").innerHTML=`<span class="badge">${c.lezioniResidue||0} residue su ${c.lezioniTotali||0}</span><br>Periodo: ${fmt(c.inizio)} → ${fmt(c.scadenza)}`;
 document.getElementById("lezioni").innerHTML="<p class='meta'>Le prossime lezioni sono visibili dal calendario coach.</p>";
}
load();
</script>
</body>
</html>
